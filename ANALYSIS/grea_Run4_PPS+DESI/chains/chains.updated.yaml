theory:
  classy:
    path: null
    speed: 0.2
    stop_at_error: false
    extra_args:
      nonlinear_min_k_max: 25
      N_ncdm: 1
      N_ur: 2.046
      sBBN file: external/bbn/sBBN_2017.dat
      non linear: hmcode
      hmcode_version: 2020
      fluid_equation_of_state: GREA
      cs2_fld: 1.0
      use_ppf: 'yes'
    ignore_obsolete: false
    renames:
      As: A_s
      ns: n_s
      nrun: alpha_s
      nrunrun: beta_s
      nt: n_t
      ntrun: alpha_t
      rdrag: rs_drag
      omegak: Omega_k
      omegal: Omega_Lambda
      w: w0_fld
      wa: wa_fld
      omegabh2: omega_b
      omegab: Omega_b
      omegach2: omega_cdm
      omegac: Omega_cdm
      omegam: Omega_m
      omegan: Omega_nu
      tau: tau_reio
      zrei: z_reio
      deltazrei: reionization_width
      helium_redshift: helium_fullreio_redshift
      helium_delta_redshift: helium_fullreio_width
      yhe: YHe
      yheused: YHe
    version: v3.3.4
    input_params:
    - n_s
    - H0
    - tau_reio
    - omega_b
    - omega_cdm
    - m_ncdm
    - A_s
    - sqrt_k_eta0
    output_params:
    - Omega_m
    - YHe
    - z_reio
    - sigma8
    - age
    - rs_drag
    - theta_star_100
    - z_star
    - rs_star
    - da_star
    - z_d
    - z_eq
    - k_eq
    - rs_d_h
likelihood:
  bao.desi_dr2:
    path: null
    measurements_file: bao_data/desi_bao_dr2/desi_gaussian_bao_ALL_GCcomb_mean.txt
    cov_file: bao_data/desi_bao_dr2/desi_gaussian_bao_ALL_GCcomb_cov.txt
    rs_fid: 1
    aliases:
    - BAO
    speed: 2000
    type: BAO
    rs_rescale: null
    prob_dist: null
    invcov_file: null
    redshift: null
    observable_1: null
    observable_2: null
    observable_3: null
    grid_file: null
    stop_at_error: false
    version: null
    input_params: []
    output_params: []
  sn.pantheonplusshoes:
    path: null
    dataset_file: PantheonPlus/config.dataset
    dataset_params: null
    aliases:
    - PantheonPlusSHOES
    use_abs_mag: false
    speed: 100
    type: SN
    stop_at_error: false
    version: null
    input_params: []
    output_params: []
params:
  logA:
    prior:
      min: 1.61
      max: 3.91
    ref:
      dist: norm
      loc: 3.05
      scale: 0.001
    proposal: 0.001
    latex: \log(10^{10} A_\mathrm{s})
    drop: true
  n_s:
    prior:
      min: 0.8
      max: 1.2
    ref:
      dist: norm
      loc: 0.965
      scale: 0.004
    proposal: 0.002
    latex: n_\mathrm{s}
    renames:
    - ns
  H0:
    prior:
      min: 40
      max: 100
    ref:
      dist: norm
      loc: 67
      scale: 2
    proposal: 2
    latex: H_0
  tau_reio:
    value: 0.06
    renames:
    - tau
  omega_b:
    prior:
      min: 0.005
      max: 0.1
    ref:
      dist: norm
      loc: 0.0224
      scale: 0.0001
    proposal: 0.0001
    latex: \Omega_\mathrm{b} h^2
    renames:
    - omegabh2
  omega_cdm:
    prior:
      min: 0.001
      max: 0.99
    ref:
      dist: norm
      loc: 0.12
      scale: 0.001
    proposal: 0.0005
    latex: \Omega_\mathrm{c} h^2
    renames:
    - omegach2
  Omega_m:
    latex: \Omega_\mathrm{m}
    derived: true
    renames:
    - omegam
  omegamh2:
    derived: 'lambda Omega_m, H0: Omega_m*(H0/100)**2'
    latex: \Omega_\mathrm{m} h^2
  m_ncdm:
    value: 0.06
  A_s:
    value: 'lambda logA: 1e-10*np.exp(logA)'
    derived: true
    latex: A_\mathrm{s}
    renames:
    - As
  YHe:
    latex: Y_\mathrm{P}
    derived: true
    renames:
    - yheused
    - yhe
  z_reio:
    latex: z_\mathrm{re}
    derived: true
    renames:
    - zrei
  sigma8:
    latex: \sigma_8
    derived: true
  s8h5:
    derived: 'lambda sigma8, H0: sigma8*(H0*1e-2)**(-0.5)'
    latex: \sigma_8/h^{0.5}
  s8omegamp5:
    derived: 'lambda sigma8, Omega_m: sigma8*Omega_m**0.5'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.5}
  s8omegamp25:
    derived: 'lambda sigma8, Omega_m: sigma8*Omega_m**0.25'
    latex: \sigma_8 \Omega_\mathrm{m}^{0.25}
  A:
    derived: 'lambda A_s: 1e9*A_s'
    latex: 10^9 A_\mathrm{s}
  clamp:
    derived: 'lambda A_s, tau_reio: 1e9*A_s*np.exp(-2*tau_reio)'
    latex: 10^9 A_\mathrm{s} e^{-2\tau}
  age:
    latex: '{\rm{Age}}/\mathrm{Gyr}'
    derived: true
  rs_drag:
    latex: r_\mathrm{drag}
    derived: true
    renames:
    - rdrag
  theta_star_100:
    latex: 100\theta_\star
    derived: true
  z_star:
    latex: z_\star
    derived: true
  rs_star:
    latex: r_\star
    derived: true
  da_star:
    latex: D_A(z_\star)
    derived: true
  z_d:
    latex: z_\mathrm{d}
    derived: true
  z_eq:
    latex: z_\mathrm{eq}
    derived: true
  k_eq:
    latex: k_\mathrm{eq}
    derived: true
  S8:
    derived: ' lambda sigma8, Omega_m: sigma8*(Omega_m/0.3)**0.5'
    latex: S_8
  omegamh3:
    derived: 'lambda Omega_m, H0: Omega_m*(H0/100)**3'
    latex: \Omega_\mathrm{m} h^3
  rs_d_h:
    latex: r_\mathrm{drag} h
    derived: true
  sqrt_k_eta0:
    prior:
      min: 2.5
      max: 4.5
    ref:
      dist: norm
      loc: 3.48
      scale: 0.1
    proposal: 0.05
    latex: \sqrt{k}\,\eta_0
  chi2__BAO:
    latex: \chi^2_\mathrm{BAO}
    derived: true
  chi2__SN:
    latex: \chi^2_\mathrm{SN}
    derived: true
sampler:
  mcmc:
    sampler_type: mcmc
    supports_periodic_params: true
    burn_in: 0
    max_tries: 40d
    covmat: auto
    covmat_params: null
    proposal_scale: 1.9
    output_every: 60s
    learn_every: 40d
    temperature: 1
    learn_proposal: true
    learn_proposal_Rminus1_max: 2.0
    learn_proposal_Rminus1_max_early: 30.0
    learn_proposal_Rminus1_min: 0.0
    max_samples: .inf
    Rminus1_stop: 0.02
    Rminus1_cl_stop: 0.2
    Rminus1_cl_level: 0.95
    Rminus1_single_split: 4
    measure_speeds: true
    oversample_power: 0.4
    oversample_thin: true
    drag: false
    blocking:
    - - 1
      - - logA
        - n_s
        - H0
        - omega_b
        - omega_cdm
        - sqrt_k_eta0
    callback_function: null
    callback_every: null
    seed: null
    check_every: null
    oversample: null
    drag_limits: null
    fallback_covmat_scale: 4
    version: 3.6.2
output: chains
version: 3.6.2
